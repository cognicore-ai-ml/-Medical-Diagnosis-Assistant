<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Diagnosis Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-between font-sans">

    <header class="bg-blue-600 text-white shadow-md p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">🩺 Medical Diagnosis Assistant</h1>
            <span class="bg-blue-700 text-xs px-2 py-1 rounded font-mono text-blue-200">v0.1.0-Prototype</span>
        </div>
    </header>

    <main class="max-w-2xl w-full mx-auto p-4 my-auto">
        <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-100">
            <h2 class="text-lg font-semibold text-gray-800 mb-2">Symptom Checker</h2>
            <p class="text-sm text-gray-500 mb-6">Enter your current symptoms below separated by commas to get preliminary, automated insights.</p>

            <form id="symptomForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Symptoms</label>
                    <input type="text" id="symptomsInput" placeholder="e.g., Fever, Cough, Headache" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Days Active</label>
                    <input type="number" id="daysInput" min="1" value="1" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition duration-150">
                    Analyze Symptoms
                </button>
            </form>

            <div id="results" class="mt-6 pt-6 border-t border-gray-100 hidden">
                <h3 class="font-medium text-gray-800 mb-2">Analysis Result:</h3>
                
                <div class="p-3 bg-gray-50 rounded-md mb-3 text-sm text-gray-700" id="insightText"></div>
                
                <div class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider mb-4">
                    <span>Urgency level:</span>
                    <span id="urgencyBadge" class="px-2 py-0.5 rounded"></span>
                </div>

                <p class="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded p-3" id="disclaimerText"></p>
            </div>
        </div>
    </main>

    <footer class="text-center p-4 text-xs text-gray-400 bg-gray-100 border-t border-gray-200">
        Educational prototype only. Not intended for clinical or diagnostic use.
    </footer>

    <script>
        document.getElementById('symptomForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const symptoms = document.getElementById('symptomsInput').value.split(',').map(s => s.trim());
            const daysActive = parseInt(document.getElementById('daysInput').value);
            
            const resultsDiv = document.getElementById('results');
            const insightText = document.getElementById('insightText');
            const urgencyBadge = document.getElementById('urgencyBadge');
            const disclaimerText = document.getElementById('disclaimerText');

            try {
                // Pointing to our local FastAPI server backend
                const response = await fetch('http://127.0.0.1:8000/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms, days_active: daysActive })
                });

                if (!response.ok) throw new Error('API server returned an error');

                const data = await response.json();
                const analysis = data.analysis;

                // Update UI elements
                insightText.innerText = analysis.insights.join(' ');
                disclaimerText.innerText = `⚠️ ${analysis.disclaimer}`;
                urgencyBadge.innerText = analysis.urgency_level;

                if (analysis.urgency_level === 'medium') {
                    urgencyBadge.className = "px-2 py-0.5 rounded bg-amber-100 text-amber-800 text-xs font-semibold uppercase tracking-wider";
                } else {
                    urgencyBadge.className = "px-2 py-0.5 rounded bg-green-100 text-green-800 text-xs font-semibold uppercase tracking-wider";
                }

                resultsDiv.classList.remove('hidden');
            } catch (err) {
                alert('Could not connect to the Backend server. Ensure your FastAPI main.py app is running on port 8000.');
            }
        });
    </script>
</body>
</html>
